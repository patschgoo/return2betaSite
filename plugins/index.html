<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugins – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Minecraft-Font@main/Minecraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Minecraft', sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header-band {
      min-height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 48px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 48px;
      padding: 0 48px;
      position: relative;
      z-index: 300;
    }
    .header-band::after {
      content: '';
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-size: auto 48px;
      transform: scaleY(-1);
      z-index: 0;
      pointer-events: none;
    }
    .header-band > * {
      position: relative;
      z-index: 1;
    }
    .header-band.wrapped .howto-link {
      flex-direction: row-reverse;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .nav-link img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .nav-spacer { flex: 1; }

    /* ── Main content area ───────────────────────────────── */
    .content {
      flex: 1;
      padding: 24px 24px 40px;
      text-align: center;
      color: #fff;
    }
    .content > h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: #55ff55;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.7);
      margin-bottom: 16px;
    }
    #intro-hint {
      font-size: clamp(0.7rem, 1.3vw, 0.9rem);
      color: #aaa;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
      margin-bottom: 28px;
    }

    /* ── Plugin readme display ───────────────────────────── */
    #plugin-readme {
      display: none;
      margin: 0 auto 40px;
      max-width: 860px;
      text-align: left;
      background: rgba(0, 0, 0, 0.68);
      border: 2px solid rgba(85, 255, 85, 0.22);
      border-radius: 4px;
      padding: 28px 32px;
      color: #d8d8d8;
      font-size: clamp(0.64rem, 1.05vw, 0.8rem);
      line-height: 1.95;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.75);
    }
    #plugin-readme.visible { display: block; }

    #plugin-readme h1 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: #55ff55;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.7);
      margin-bottom: 16px;
      text-align: center;
    }
    #plugin-readme h2 {
      font-size: clamp(0.8rem, 1.4vw, 1rem);
      color: #aaffaa;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
      margin-top: 22px;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(85,255,85,0.22);
    }
    #plugin-readme h3 {
      font-size: clamp(0.72rem, 1.2vw, 0.9rem);
      color: #88dd88;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
      margin-top: 14px;
      margin-bottom: 6px;
    }
    #plugin-readme p { margin-bottom: 10px; }
    #plugin-readme ul,
    #plugin-readme ol {
      margin-left: 22px;
      margin-bottom: 10px;
    }
    #plugin-readme li { margin-bottom: 5px; }
    #plugin-readme strong { color: #fff; }
    #plugin-readme em { color: #ccffcc; font-style: normal; }
    #plugin-readme a {
      color: #55ff55;
      text-decoration: underline;
    }
    #plugin-readme hr {
      border: none;
      border-top: 1px solid rgba(85,255,85,0.2);
      margin: 18px 0;
    }
    #plugin-readme code {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 1px 5px;
      border-radius: 2px;
      color: #ffff55;
      font-family: 'Minecraft', monospace;
      font-size: 0.92em;
    }
    #plugin-readme pre {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.13);
      padding: 12px 14px;
      border-radius: 3px;
      overflow-x: auto;
      margin-bottom: 12px;
    }
    #plugin-readme pre code {
      background: none;
      border: none;
      padding: 0;
      color: #ffff88;
    }
    #plugin-readme table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.92em;
    }
    #plugin-readme th {
      background: rgba(85,255,85,0.13);
      color: #88ffaa;
      padding: 7px 12px;
      text-align: left;
      border: 1px solid rgba(85,255,85,0.22);
      font-weight: normal;
    }
    #plugin-readme td {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.09);
      vertical-align: top;
    }
    #plugin-readme tr:nth-child(odd) td  { background: rgba(255,255,255,0.04); }
    #plugin-readme tr:nth-child(even) td { background: rgba(0,0,0,0.25); }

    .readme-loading {
      text-align: center;
      color: #666;
      font-size: 0.78rem;
      padding: 24px 0;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    }

    /* ── Foldable plugin-selector panel ─────────────────── */
    /* panel-wrap slides as one unit; tab is glued to its right edge */
    .panel-wrap {
      --panel-w: 210px;
      position: fixed;
      top: 0;           /* overridden by JS to sit below header */
      left: 0;
      bottom: 0;
      z-index: 200;
      width: var(--panel-w);
      transform: translateX(calc(-1 * var(--panel-w)));
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .panel-wrap.open {
      transform: translateX(0);
    }

    /* The panel contents */
    .plugin-panel {
      pointer-events: all;
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      background: rgba(6, 10, 6, 0.85);
      border-right: 2px solid rgba(85,255,85,0.28);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display: flex;
      flex-direction: column;
    }

    /* Tab sits flush against the right edge of the panel, moves with it */
    .panel-tab {
      pointer-events: all;
      position: absolute;
      left: var(--panel-w);
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;  /* text reads top → bottom */
      background: rgba(8, 14, 8, 0.82);
      border: 2px solid rgba(85,255,85,0.45);
      border-left: none;
      border-radius: 0 6px 6px 0;
      color: #55ff55;
      font-family: 'Minecraft', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 2px;
      padding: 12px 7px;
      cursor: pointer;
      user-select: none;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .panel-tab:hover {
      background: rgba(20, 40, 20, 0.9);
      color: #aaff88;
      border-color: rgba(85,255,85,0.7);
    }
    /* Arrow rendered in normal (horizontal) mode so it doesn't get rotated by writing-mode */
    .tab-arrow {
      display: block;
      writing-mode: horizontal-tb;
      text-align: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      width: 100%;
    }
    .panel-wrap:not(.open) .tab-arrow::before { content: '\25B6'; } /* ▶ */
    .panel-wrap.open      .tab-arrow::before { content: '\25C0'; } /* ◀ */

    .plugin-panel-header {
      flex-shrink: 0;
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(85,255,85,0.22);
      color: #55ff55;
      font-size: 0.75rem;
      text-align: center;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.85);
      letter-spacing: 1px;
    }

    .plugin-list {
      flex: 1;
      overflow-y: auto;
      padding: 5px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(85,255,85,0.35) transparent;
    }
    .plugin-list::-webkit-scrollbar       { width: 5px; }
    .plugin-list::-webkit-scrollbar-track { background: transparent; }
    .plugin-list::-webkit-scrollbar-thumb {
      background: rgba(85,255,85,0.35);
      border-radius: 3px;
    }

    .plugin-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      color: #b8b8b8;
      font-family: 'Minecraft', sans-serif;
      font-size: 0.68rem;
      padding: 7px 14px;
      cursor: pointer;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
      letter-spacing: 0.4px;
      transition: background 0.1s, color 0.1s;
    }
    .plugin-item:hover {
      background: rgba(85,255,85,0.1);
      color: #eee;
    }
    .plugin-item.active {
      background: rgba(85,255,85,0.18);
      color: #55ff55;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 720px) {
      .header-band {
        gap: 0 24px;
        padding: 0 16px;
      }
      .nav-link { font-size: 0.8rem; }
      .nav-link img { height: 28px; width: 28px; }
      .howto-text { display: none; }
      .panel-wrap { --panel-w: 175px; }
      #plugin-readme { padding: 18px 16px; }
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header">
    <a class="nav-link" href="/"><img src="../images/home_icon.png" alt="Home icon" />Home</a>
    <a class="nav-link" href="/map/"><img src="../images/map_icon.webp" alt="Map icon" />Map</a>
    <a class="nav-link" href="/plugins/"><img src="../images/plugins_icon.png" alt="Plugins icon" />Plugins</a>
    <a class="nav-link" href="https://discord.gg/vVvs7tN5p7" target="_blank" rel="noopener noreferrer"><img src="../images/discord_icon.png" alt="Discord icon" />Discord</a>
    <div class="nav-spacer"></div>
    <a class="nav-link howto-link" href="/how-to/"><span class="howto-text">How to Join &amp; more</span><img src="../images/how-to_icon.gif" alt="How to icon" /></a>
  </header>

  <main class="content">
    <h1>Plugins</h1>
    <p id="intro-hint">Open the panel on the left and select a plugin to read about it.</p>
    <div id="plugin-readme"></div>
  </main>

  <!-- Foldable plugin selector panel -->
  <div class="panel-wrap" id="panelWrap">
    <nav class="plugin-panel" id="pluginPanel" aria-label="Plugin list">
      <div class="plugin-panel-header">&#8212; Plugin List &#8212;</div>
      <div class="plugin-list" id="pluginList" role="list"></div>
    </nav>
    <button class="panel-tab" id="panelTab" aria-expanded="false" aria-controls="pluginPanel">
      <span class="tab-arrow" aria-hidden="true" style="
    width: 30px;
    padding-left: 6px;
    padding-top: 20px;
    margin-bottom: unset;
    height: 38px;
"></span>Plugins
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script>
    // ── Plugin list ────────────────────────────────────────
    const PLUGINS = [
      "AcceptRules","AntiNetherRoof","AuthMe","Backup","BetaExtraGen",
      "BetaServerCommands","BetaSprint","BitTweaks","BlocksOnGlass","BucketReturn",
      "Citizens","CommandiConomy","CommandSigns","CookieHeal","CustomPortalSize",
      "DeadMansChest","DisableCrafts","DynamicLight","Dynmap","Essentials",
      "EssentialsChat","EssentialsProtect","EssentialsSpawn","FalseBook","GetStairs",
      "GiftOfTheDay","HeroicDeath","iConomy","InventorySort","ItemLWC",
      "JWildTP","LagMeter","LegacyVoiceChat","LWC","MagicCarpet",
      "MemoryStone","MiningTNT","MobSpawn","MossyGrow","NaturalGiants",
      "NaturalHumans","Nethertext","NoCheat","NoFloatingTrees","NoFullHealthEating",
      "OtherDrops","Permissions","PermissionsEx","Pickup","PluginReloader",
      "PreciousStones","QuestPlus","RankUp","ReciPlus","Reporter",
      "SaddleDrop","Seasons","ServerLogSaver","Showcase","SimpleClans",
      "SimpleSignEdit","SleepPercent","Sprint","Stackable","SuperLog",
      "Timber","TrainCarts","Trasher","Tuto","Vault",
      "Vote","WirelessRedstone","WorldEdit","WorldGuard"
    ];

    const panelWrap  = document.getElementById('panelWrap');
    const panelTab   = document.getElementById('panelTab');
    const pluginList = document.getElementById('pluginList');
    const readme     = document.getElementById('plugin-readme');
    const introHint  = document.getElementById('intro-hint');

    // Build plugin list buttons
    PLUGINS.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'plugin-item';
      btn.textContent = name;
      btn.setAttribute('role', 'listitem');
      btn.addEventListener('click', () => selectPlugin(name, btn));
      pluginList.appendChild(btn);
    });

    // Toggle panel open / closed
    panelTab.addEventListener('click', () => {
      const open = panelWrap.classList.toggle('open');
      panelTab.setAttribute('aria-expanded', open);
    });

    // Load and render plugin markdown
    async function selectPlugin(name, btn) {
      document.querySelectorAll('.plugin-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      introHint.style.display = 'none';
      readme.classList.add('visible');
      readme.innerHTML = '<p class="readme-loading">Loading...</p>';

      try {
        const res = await fetch('../ReadMe/plugins/' + encodeURIComponent(name) + '.md');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        readme.innerHTML = marked.parse(text);
        readme.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch {
        readme.innerHTML = '<p class="readme-loading">Could not load plugin info.</p>';
      }
    }
  </script>
  <script>
    (function () {
      const header  = document.querySelector('.header-band');
      const panelWrapEl = document.getElementById('panelWrap');
      if (!header) return;

      function checkHeader() {
        header.classList.toggle('wrapped', header.scrollHeight > 48);
      }

      function updatePanelTop() {
        panelWrapEl.style.top = (header.offsetTop + header.offsetHeight) + 'px';
      }

      const obs = new ResizeObserver(() => { checkHeader(); updatePanelTop(); });
      obs.observe(header);
      checkHeader();
      updatePanelTop();
    })();
  </script>
</body>
</html>
