<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How to Join & more – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Minecraft-Font@main/Minecraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Minecraft', sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 48px;
    }
    .header-band {
      min-height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 48px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 48px;
      padding: 0 48px;
      position: fixed;
      top: 0;
      z-index: 10;
    }
    .header-band::after {
      content: '';
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-size: auto 48px;
      transform: scaleY(-1);
      z-index: 0;
      pointer-events: none;
    }
    .header-band > * {
      position: relative;
      z-index: 1;
    }
    .header-band.wrapped .howto-link {
      flex-direction: row-reverse;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .nav-link img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .nav-spacer {
      flex: 1;
    }
    .content {
      flex: 1;
      padding: 24px;
      text-align: center;
      color: #fff;
    }
    .content h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: #55ff55;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.7);
      margin-bottom: 20px;
    }
    .content p {
      font-size: clamp(0.75rem, 1.4vw, 1rem);
      line-height: 1.8;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.692);
    }
    @media (max-width: 720px) {
      .header-band {
        min-height: 48px;
        gap: 0 24px;
        padding: 0 16px;
      }
      .nav-link { font-size: 0.8rem; }
      .nav-link img { height: 28px; width: 28px; }
      .howto-text { display: none; }
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header">
    <a class="nav-link" href="/"><img src="../images/home_icon.png" alt="Home icon" />Home</a>
    <a class="nav-link" href="/map/"><img src="../images/map_icon.webp" alt="Map icon" />Map</a>
    <a class="nav-link" href="/plugins/"><img src="../images/plugins_icon.png" alt="Plugins icon" />Plugins</a>
    <a class="nav-link" href="https://discord.gg/vVvs7tN5p7" target="_blank" rel="noopener noreferrer"><img src="../images/discord_icon.png" alt="Discord icon" />Discord</a>
    <a class="nav-link" href="/chat/"><img src="../images/chat_icon.png" alt="Chat icon" />Chat</a>
    <div class="nav-spacer"></div>
    <a class="nav-link howto-link" href="/how-to/"><span class="howto-text">How to Join &amp; more</span><img src="../images/how-to_icon.gif" alt="How to icon" /></a>
  </header>

  <main class="content">
    <h1>How to Join &amp; more</h1>
    <p>Coming soon...</p>
  </main>
  <script>
    (function() {
      const header = document.querySelector('.header-band');
      if (!header) return;
      function check() {
        header.classList.toggle('wrapped', header.scrollHeight > 48);
      }
      new ResizeObserver(check).observe(header);
      check();
    })();
  </script>

  <!-- Floating chat widget -->
  <style>
    .chat-widget-btn{position:fixed;z-index:500;width:52px;height:52px;border-radius:50%;border:2px solid rgba(85,255,85,0.5);background:rgba(6,10,6,0.88);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.5);transition:background .15s,transform .15s}
    .chat-widget-btn:hover{background:rgba(20,40,20,0.95);transform:scale(1.08)}
    .chat-widget-btn img{width:30px;height:30px;object-fit:contain}
    .chat-widget-panel{position:fixed;z-index:500;width:340px;height:420px;background:rgba(6,10,6,0.95);border:2px solid rgba(85,255,85,0.35);border-radius:8px;display:none;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.6);font-family:'Minecraft',sans-serif}
    .chat-widget-panel.open{display:flex}
    .cw-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(85,255,85,0.22);font-size:.7rem;color:#55ff55;text-shadow:1px 1px 0 rgba(0,0,0,0.8)}
    .cw-close{background:none;border:none;color:#55ff55;font-size:1rem;cursor:pointer;font-family:'Minecraft',sans-serif}.cw-close:hover{color:#ff5555}
    .cw-status{color:#888;font-size:.6rem}.cw-status.connected{color:#55ff55}
    .cw-messages{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;scrollbar-color:rgba(85,255,85,0.3) transparent;font-size:.62rem;color:#d8d8d8;line-height:1.5;text-shadow:1px 1px 0 rgba(0,0,0,0.7)}
    .cw-messages::-webkit-scrollbar{width:4px}.cw-messages::-webkit-scrollbar-thumb{background:rgba(85,255,85,0.3);border-radius:2px}
    .cw-msg .time{color:#555;font-size:.85em;margin-right:4px}.cw-msg .name-web{color:#55ff55}.cw-msg .name-discord{color:#7289da}.cw-msg.system{color:#888;font-style:italic}
    .cw-input-area{display:flex;border-top:1px solid rgba(85,255,85,0.22)}
    .cw-input-area input{flex:1;background:rgba(0,0,0,0.5);border:none;padding:8px 10px;color:#d8d8d8;font-family:'Minecraft',sans-serif;font-size:.62rem;outline:none}
    .cw-input-area input::placeholder{color:#555}
    .cw-input-area button{padding:8px 14px;background:rgba(85,255,85,0.18);border:none;border-left:1px solid rgba(85,255,85,0.22);color:#55ff55;font-family:'Minecraft',sans-serif;font-size:.62rem;cursor:pointer}
    .cw-input-area button:hover{background:rgba(85,255,85,0.3)}
    .cw-name-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:8px}
    .cw-name-overlay.hidden{display:none}
    .cw-name-box{text-align:center;padding:20px}
    .cw-name-box h3{color:#55ff55;font-size:.8rem;margin-bottom:10px;text-shadow:2px 2px 0 rgba(0,0,0,0.7)}
    .cw-name-box input{width:180px;padding:6px 10px;background:rgba(0,0,0,0.6);border:1px solid rgba(85,255,85,0.3);border-radius:3px;color:#d8d8d8;font-family:'Minecraft',sans-serif;font-size:.7rem;outline:none;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
    .cw-name-box button{padding:6px 18px;background:rgba(85,255,85,0.22);border:2px solid rgba(85,255,85,0.5);border-radius:3px;color:#55ff55;font-family:'Minecraft',sans-serif;font-size:.65rem;cursor:pointer}
    .cw-expand-link{display:block;text-align:center;padding:4px;font-size:.55rem;color:#888;text-decoration:none;border-top:1px solid rgba(85,255,85,0.12)}.cw-expand-link:hover{color:#55ff55}
    @media(min-width:721px){.chat-widget-btn{bottom:80px;right:24px}.chat-widget-panel{bottom:140px;right:24px}}
    @media(max-width:720px){.chat-widget-btn{bottom:16px;right:16px}.chat-widget-panel{bottom:76px;right:8px;width:290px;height:370px}}
  </style>
  <button class="chat-widget-btn" id="cwToggle" title="Open chat"><img src="../images/chat_icon.png" alt="Chat" /></button>
  <div class="chat-widget-panel" id="cwPanel">
    <div class="cw-header"><span>Chat <span class="cw-status" id="cwStatus">Connecting...</span></span><button class="cw-close" id="cwClose">&times;</button></div>
    <div class="cw-messages" id="cwMessages"></div>
    <div class="cw-input-area"><input type="text" id="cwInput" placeholder="Type a message..." maxlength="500" autocomplete="off" disabled /><button id="cwSend" disabled>Send</button></div>
    <a class="cw-expand-link" href="/chat/">Open full chat &rarr;</a>
    <div class="cw-name-overlay" id="cwNameOverlay"><div class="cw-name-box"><h3>Guest Name</h3><input type="text" id="cwNameInput" placeholder="Your name" maxlength="24" autocomplete="off" /><button id="cwNameBtn">Join</button></div></div>
  </div>
  <script>
  (function(){var WS_URL='wss://chat.return2beta.com';var toggle=document.getElementById('cwToggle');var panel=document.getElementById('cwPanel');var closeBtn=document.getElementById('cwClose');var msgs=document.getElementById('cwMessages');var input=document.getElementById('cwInput');var sendBtn=document.getElementById('cwSend');var status=document.getElementById('cwStatus');var nameOverlay=document.getElementById('cwNameOverlay');var nameInput=document.getElementById('cwNameInput');var nameBtn=document.getElementById('cwNameBtn');var ws=null,username=null,reconnectDelay=1000,opened=false;toggle.addEventListener('click',function(){panel.classList.toggle('open');if(!opened){opened=true;connect();}});closeBtn.addEventListener('click',function(){panel.classList.remove('open');});function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}function formatTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}function addMsg(html){var d=document.createElement('div');d.className='cw-msg';d.innerHTML=html;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}function addSys(t){var d=document.createElement('div');d.className='cw-msg system';d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}function renderChat(m){var nc=m.source==='discord'?'name-discord':'name-web';var b=m.source==='discord'?'[Discord]':'[Guest]';addMsg('<span class="time">'+escapeHtml(formatTime(m.timestamp))+'</span><span class="'+nc+'">'+escapeHtml(b+' '+m.username)+':</span> '+escapeHtml(m.text));}function connect(){ws=new WebSocket(WS_URL);ws.onopen=function(){status.textContent='Connected';status.classList.add('connected');reconnectDelay=1000;if(username)ws.send(JSON.stringify({type:'set_username',username:username}));};ws.onmessage=function(e){var data;try{data=JSON.parse(e.data);}catch(x){return;}if(data.type==='history'&&data.messages){data.messages.forEach(renderChat);return;}if(data.type==='username_set'){nameOverlay.classList.add('hidden');input.disabled=false;sendBtn.disabled=false;input.focus();return;}if(data.type==='error'){addSys(data.message);return;}if(data.type==='chat')renderChat(data);};ws.onclose=function(){status.textContent='Reconnecting...';status.classList.remove('connected');input.disabled=true;sendBtn.disabled=true;setTimeout(connect,reconnectDelay);reconnectDelay=Math.min(reconnectDelay*2,15000);};ws.onerror=function(){ws.close();};}function send(){var t=input.value.trim();if(!t||!ws||ws.readyState!==1)return;ws.send(JSON.stringify({type:'chat',text:t}));input.value='';input.focus();}sendBtn.addEventListener('click',send);input.addEventListener('keydown',function(e){if(e.key==='Enter')send();});nameBtn.addEventListener('click',function(){var n=nameInput.value.trim();if(!n)return;username=n;if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'set_username',username:n}));});nameInput.addEventListener('keydown',function(e){if(e.key==='Enter')nameBtn.click();});})();
  </script>
</body>
</html>
