<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Map – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
      display: flex;
      flex-direction: column;
    }
    .header-band {
      height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 100%;
      flex-shrink: 0;
    }
    .map-area {
      flex: 1;
      overflow: hidden;
    }
    .map-area iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    @media (max-width: 720px) {
      .header-band { height: 120px; }
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header"></header>
  <div class="map-area">
    <iframe src="https://map.return2beta.com/" title="Server Map" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
  </div>
</body>
</html>
