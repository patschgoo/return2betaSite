<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Minecraft-Font@main/Minecraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Minecraft', sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 48px;
    }
    .header-band {
      min-height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 48px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 48px;
      padding: 0 48px;
      position: fixed;
      top: 0;
      z-index: 10;
    }
    .header-band::after {
      content: '';
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-size: auto 48px;
      transform: scaleY(-1);
      z-index: 0;
      pointer-events: none;
    }
    .header-band > * {
      position: relative;
      z-index: 1;
    }
    .header-band.wrapped .howto-link {
      flex-direction: row-reverse;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .nav-link img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .nav-spacer { flex: 1; }
    .wiki-frame {
      flex: 1;
      width: 100%;
      border: none;
      transition: filter 0.3s;
    }
    .wiki-frame.dark {
      filter: invert(0.9) hue-rotate(180deg);
    }
    .dark-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 20;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(85,255,85,0.5);
      background: rgba(6,10,6,0.88);
      color: #55ff55;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      transition: background 0.15s, transform 0.15s;
      font-family: 'Minecraft', sans-serif;
    }
    .dark-toggle:hover {
      background: rgba(20,40,20,0.95);
      transform: scale(1.08);
    }
    @media (max-width: 720px) {
      .header-band {
        min-height: 48px;
        gap: 0 24px;
        padding: 0 16px;
      }
      .nav-link { font-size: 0.8rem; }
      .nav-link img { height: 28px; width: 28px; }
      .howto-text { display: none; }
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header">
    <a class="nav-link" href="/"><img src="../images/home_icon.png" alt="Home icon" />Home</a>
    <a class="nav-link" href="/map/"><img src="../images/map_icon.webp" alt="Map icon" />Map</a>
    <a class="nav-link" href="/plugins/"><img src="../images/plugins_icon.png" alt="Plugins icon" />Plugins</a>
    <a class="nav-link" href="/chat/"><img src="../images/chat_icon.png" alt="Chat icon" />Chat</a>
    <a class="nav-link" href="https://discord.gg/vVvs7tN5p7" target="_blank" rel="noopener noreferrer"><img src="../images/discord_icon.png" alt="Discord icon" />Discord</a>
    <a class="nav-link" href="/wiki/"><img src="../images/wiki_icon.png" alt="Wiki icon" />Wiki</a>
    <div class="nav-spacer"></div>
    <a class="nav-link howto-link" href="/how-to/"><span class="howto-text">How to Join &amp; more</span><img src="../images/how-to_icon.gif" alt="How to icon" /></a>
  </header>

  <iframe class="wiki-frame" id="wikiFrame" src="https://web.archive.org/web/20110902065819/http://www.minecraftwiki.net:80/wiki/Minecraft_Wiki" title="Minecraft Wiki (Beta era)"></iframe>
  <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">☾</button>

  <script>
    (function() {
      var frame = document.getElementById('wikiFrame');
      var btn = document.getElementById('darkToggle');
      var dark = localStorage.getItem('r2b_wiki_dark') === '1';
      if (dark) frame.classList.add('dark');
      btn.textContent = dark ? '\u2600' : '\u263E';
      btn.addEventListener('click', function() {
        dark = !dark;
        frame.classList.toggle('dark', dark);
        btn.textContent = dark ? '\u2600' : '\u263E';
        localStorage.setItem('r2b_wiki_dark', dark ? '1' : '0');
      });
    })();
  </script>

  <script>
    (function() {
      const header = document.querySelector('.header-band');
      if (!header) return;
      function check() {
        header.classList.toggle('wrapped', header.scrollHeight > 48);
      }
      new ResizeObserver(check).observe(header);
      check();
    })();
  </script>
</body>
</html>
