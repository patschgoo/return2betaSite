<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Minecraft-Font@main/Minecraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Minecraft', sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 48px;
    }
    .header-band {
      min-height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 48px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 48px;
      padding: 0 48px;
      position: fixed;
      top: 0;
      z-index: 10;
    }
    .header-band::after {
      content: '';
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-size: auto 48px;
      transform: scaleY(-1);
      z-index: 0;
      pointer-events: none;
    }
    .header-band > * {
      position: relative;
      z-index: 1;
    }
    .header-band.wrapped .howto-link {
      flex-direction: row-reverse;
    }
    .header-band.wrapped .howto-text { font-size: 0.45rem; max-width: 50px; }
    .header-band.wrapped .nav-dropdown > .nav-link { flex-direction: row-reverse; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .nav-link img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .nav-spacer { flex: 1; }
    .wiki-frame {
      flex: 1;
      width: 100%;
      border: none;
      transition: filter 0.3s;
    }
    .wiki-frame.scaled {
      flex: none;
      transform-origin: top left;
    }
    .wiki-frame.dark {
      filter: invert(0.9) hue-rotate(180deg);
    }
    .dark-toggle {
      position: fixed;
      top: 58px;
      right: 24px;
      z-index: 20;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(85,255,85,0.5);
      background: rgba(6,10,6,0.88);
      color: #55ff55;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      transition: background 0.15s, transform 0.15s;
      font-family: 'Minecraft', sans-serif;
    }
    .dark-toggle:hover {
      background: rgba(20,40,20,0.95);
      transform: scale(1.08);
    }
    .wiki-disclaimer {
      position: fixed;
      bottom: 12px;
      left: 16px;
      z-index: 20;
      background: rgba(6,10,6,0.55);
      border: 1px solid rgba(85,255,85,0.2);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Minecraft', sans-serif;
      font-size: clamp(0.5rem, 0.9vw, 0.65rem);
      color: rgba(255,255,255,0.5);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
      pointer-events: auto;
    }
    .wiki-disclaimer a {
      color: rgba(85,255,85,0.6);
      text-decoration: none;
    }
    .wiki-disclaimer a:hover {
      color: #55ff55;
      text-decoration: underline;
    }
    /* Nav carousel */
    .nav-carousel { display: none; width: 100%; align-items: center; justify-content: center; height: 48px; }
    .nav-caret { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 1.1rem; cursor: pointer; padding: 0 14px; height: 48px; display: flex; align-items: center; flex-shrink: 0; transition: color 0.15s; }
    .nav-caret:hover { color: #fff; }
    .nav-caret:disabled { opacity: 0.2; cursor: default; }
    .nav-carousel-items { display: flex; align-items: center; justify-content: center; gap: 20px; flex: 1; overflow: hidden; }
    .nav-carousel .nav-link { white-space: nowrap; }
    .nav-carousel .nav-link.nav-current { color: #55ff55; text-shadow: 0 0 8px rgba(85,255,85,0.4); }
    @media (max-width: 720px) {
      .header-band {
        min-height: 48px;
        gap: 0 24px;
        padding: 0 16px;
      }
      .nav-link { font-size: 0.8rem; }
      .nav-link img { height: 28px; width: 28px; }
      .header-band > .nav-link,
      .header-band > .nav-dropdown,
      .header-band > .nav-spacer { display: none; }
      .nav-carousel { display: flex; }
      .nav-caret { padding: 0 10px; }
      .nav-carousel-items { gap: 8px; }
    }
    .nav-dropdown { position: relative; }
    .nav-dropdown-menu { display: none; position: absolute; top: 48px; left: 50%; transform: translateX(-50%); background: rgba(10,16,10,0.96); border: 2px solid rgba(85,255,85,0.3); border-radius: 4px; padding: 8px 0; min-width: 180px; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.7); }
    .nav-dropdown:hover .nav-dropdown-menu, .nav-dropdown.open .nav-dropdown-menu { display: block; }
    .nav-dropdown-menu .dropdown-link { display: flex; align-items: center; gap: 8px; padding: 6px 16px; color: #ccc; text-decoration: none; font-size: 0.75rem; font-family: 'Minecraft', sans-serif; text-shadow: 1px 1px 0 rgba(0,0,0,0.7); white-space: nowrap; }
    .nav-dropdown-menu .dropdown-link img { width: 18px; height: 18px; object-fit: contain; image-rendering: pixelated; }
    .nav-dropdown-menu .dropdown-link:hover { background: rgba(85,255,85,0.1); color: #fff; }
    .nav-dropdown-menu hr { border: none; border-top: 1px solid rgba(85,255,85,0.12); margin: 4px 10px; }
    .nav-dropdown-menu .dropdown-more { display: block; padding: 6px 16px; color: #55ff55; text-decoration: none; font-size: 0.7rem; font-family: 'Minecraft', sans-serif; text-shadow: 1px 1px 0 rgba(0,0,0,0.7); white-space: nowrap; }
    .nav-dropdown-menu .dropdown-more:hover { background: rgba(85,255,85,0.1); color: #aaff88; }
    @media (max-width: 720px) {
      .nav-dropdown.open { display: block !important; position: fixed; top: 48px; left: 0; right: 0; z-index: 100; }
      .nav-dropdown.open > .nav-link { display: none !important; }
      .nav-dropdown.open .nav-dropdown-menu { position: static; transform: none; width: 100%; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>

  <iframe class="wiki-frame" id="wikiFrame" src="https://web.archive.org/web/20110902065819/http://www.minecraftwiki.net:80/wiki/Minecraft_Wiki" title="Minecraft Wiki (Beta era)"></iframe>
  <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">☾</button>
  <div class="wiki-disclaimer" id="wikiDisclaimer">Disclaimer: this is a redirection to the archived <a href="https://web.archive.org/web/20110902065819/http://www.minecraftwiki.net:80/wiki/Minecraft_Wiki" target="_blank" rel="noopener noreferrer">Minecraft Wiki</a></div>

  <script>
    (function() {
      var frame = document.getElementById('wikiFrame');
      var btn = document.getElementById('darkToggle');
      var dark = localStorage.getItem('r2b_wiki_dark') === '1';
      if (dark) frame.classList.add('dark');
      btn.textContent = dark ? '\u2600' : '\u263E';
      btn.addEventListener('click', function() {
        dark = !dark;
        frame.classList.toggle('dark', dark);
        btn.textContent = dark ? '\u2600' : '\u263E';
        localStorage.setItem('r2b_wiki_dark', dark ? '1' : '0');
      });
    })();
  </script>
  <script>
    (function() {
      var frame = document.getElementById('wikiFrame');
      var WIKI_W = 980;
      function scaleWiki() {
        if (window.innerWidth <= 720) {
          var scale = window.innerWidth / WIKI_W;
          frame.style.width = WIKI_W + 'px';
          frame.style.height = Math.ceil((window.innerHeight - 48) / scale) + 'px';
          frame.style.transform = 'scale(' + scale + ')';
          frame.classList.add('scaled');
        } else {
          frame.style.width = '';
          frame.style.height = '';
          frame.style.transform = '';
          frame.classList.remove('scaled');
        }
      }
      scaleWiki();
      window.addEventListener('resize', scaleWiki);
    })();
  </script>

  <script>
    (function() {
      const header = document.querySelector('.header-band');
      const darkBtn = document.getElementById('darkToggle');
      if (!header) return;
      function check() {
        var wrapped = header.scrollHeight > 48;
        header.classList.toggle('wrapped', wrapped);
        if (wrapped) {
          darkBtn.style.top = '104px';
          darkBtn.style.right = '16px';
        } else {
          darkBtn.style.top = '58px';
          darkBtn.style.right = '24px';
        }
      }
      new ResizeObserver(check).observe(header);
      window.addEventListener('resize', check);
      check();
    })();
  </script>
  <script>
    (function () {
      var header = document.querySelector('.header-band');
      if (!header) return;
      var allLinks = Array.from(header.querySelectorAll(':scope > .nav-link, :scope > .nav-dropdown > .nav-link'));
      var spacer = header.querySelector(':scope > .nav-spacer');
      var carousel = document.getElementById('navCarousel');
      var prevBtn = document.getElementById('navPrev');
      var nextBtn = document.getElementById('navNext');
      var itemsEl = document.getElementById('navCarouselItems');
      if (!carousel || !prevBtn || !nextBtn || !itemsEl || !allLinks.length) return;
      var N = 3, page = 0;
      var total = Math.ceil(allLinks.length / N);
      var cp = location.pathname.replace(/\/$/, '') || '/';
      for (var i = 0; i < allLinks.length; i++) {
        var lh = (allLinks[i].getAttribute('href') || '').replace(/\/$/, '') || '/';
        if (lh === cp) { page = Math.floor(i / N); break; }
      }
      function render() {
        itemsEl.innerHTML = '';
        allLinks.slice(page * N, (page + 1) * N).forEach(function (a) {
          var cl = a.cloneNode(true);
          var lh = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
          if (lh === cp) cl.classList.add('nav-current');
          itemsEl.appendChild(cl);
        });
        prevBtn.disabled = page === 0;
        nextBtn.disabled = page >= total - 1;
      }
      prevBtn.addEventListener('click', function () { if (page > 0) { page--; render(); } });
      nextBtn.addEventListener('click', function () { if (page < total - 1) { page++; render(); } });
      render();
      itemsEl.addEventListener('click', function(e) {
        var link = e.target.closest('a[href$="/games/"]');
        if (link) { e.preventDefault(); var dd = document.getElementById('gamesDropdown'); if (dd) dd.classList.toggle('open'); }
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-dropdown') && !e.target.closest('#navCarouselItems')) {
          var dd = document.getElementById('gamesDropdown'); if (dd) dd.classList.remove('open');
        }
      });
      var forced = false;
      var dropdown = header.querySelector(':scope > .nav-dropdown');
      function forceOn() {
        if (forced) return; forced = true;
        allLinks.forEach(function (a) { a.style.display = 'none'; });
        if (dropdown) dropdown.style.display = 'none';
        if (spacer) spacer.style.display = 'none';
        carousel.style.display = 'flex';
      }
      function forceOff() {
        if (!forced) return; forced = false;
        allLinks.forEach(function (a) { a.style.display = ''; });
        if (dropdown) dropdown.style.display = '';
        if (spacer) spacer.style.display = '';
        if (window.innerWidth > 720) carousel.style.display = 'none';
      }
      if (window.innerWidth > 720 && header.scrollHeight > 100) forceOn();
      var rt;
      window.addEventListener('resize', function () {
        clearTimeout(rt);
        rt = setTimeout(function () {
          if (window.innerWidth <= 720) { forceOff(); return; }
          forceOff();
          requestAnimationFrame(function () { if (header.scrollHeight > 100) forceOn(); });
        }, 150);
      });
    }());
  </script>

  <!-- Map popup -->
  <style>
    .map-panel{display:flex;flex-direction:column;align-items:center;gap:4px;position:fixed;right:0;bottom:24px;transition:transform 0.3s ease;z-index:100;padding-right:24px}
    .map-panel.collapsed{transform:translateX(calc(100% - 32px))}
    .map-fold-btn{position:absolute;left:-24px;top:216px;width:24px;height:36px;border:none;border-radius:4px 0 0 4px;background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,color 0.2s}
    .map-fold-btn:hover{background:rgba(0,0,0,0.7);color:#fff}
    .map-wrapper{position:relative;width:min(36vw,270px);height:min(36vw,270px);border:2px solid rgba(255,255,255,0.3);border-radius:6px;overflow:hidden;background:#111;transition:all 0.3s ease}
    .map-wrapper iframe{width:100%;height:100%;border:none}
    .map-controls{position:absolute;top:4px;right:4px;display:flex;gap:4px;z-index:10}
    .map-btn{width:24px;height:24px;border:none;border-radius:4px;background:rgba(0,0,0,0.65);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background 0.2s}
    .map-btn:hover{background:rgba(0,0,0,0.85)}
    .map-label{margin:0;color:#fff;font-size:1rem;font-weight:400;letter-spacing:0.04em;font-family:'Minecraft',sans-serif}
    .map-panel.maximized{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1000;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;padding:24px;margin:0}
    .map-panel.maximized .map-wrapper{width:100%;height:100%;max-width:100%;max-height:100%;border-radius:8px}
    .map-panel.maximized .map-controls{top:8px;right:8px}
    .map-panel.maximized .map-btn{width:32px;height:32px;font-size:18px}

    @media(max-width:720px){.map-panel{display:none}}
  </style>
  <section class="map-panel" id="mapPanel" aria-label="Server map">
    <button class="map-fold-btn" id="mapFoldBtn" title="Hide map">&#x25B6;</button>
    <p class="map-label">Server Map</p>
    <div class="map-wrapper">
      <div class="map-controls"><button class="map-btn" id="mapToggle" title="Maximize map">&#x26F6;</button></div>
      <iframe src="https://map.return2beta.com/" title="Server Map" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    </div>
  </section>
  <script>
  (function(){var mp=document.getElementById('mapPanel'),fb=document.getElementById('mapFoldBtn'),mt=document.getElementById('mapToggle');if(localStorage.getItem('r2b_map_collapsed')==='1'){mp.classList.add('collapsed');fb.innerHTML='&#x25C0;';fb.title='Show map';}fb.addEventListener('click',function(){var c=mp.classList.toggle('collapsed');fb.innerHTML=c?'&#x25C0;':'&#x25B6;';fb.title=c?'Show map':'Hide map';localStorage.setItem('r2b_map_collapsed',c?'1':'0');});mt.addEventListener('click',function(){if(mp.classList.contains('collapsed')){mp.classList.remove('collapsed');fb.innerHTML='&#x25B6;';fb.title='Hide map';localStorage.setItem('r2b_map_collapsed','0');}var m=mp.classList.toggle('maximized');mt.innerHTML=m?'\u2715':'\u26F6';mt.title=m?'Minimize map':'Maximize map';});document.addEventListener('keydown',function(e){if(e.key==='Escape'&&mp.classList.contains('maximized')){mp.classList.remove('maximized');mt.innerHTML='\u26F6';mt.title='Maximize map';}});var DU='https://map.return2beta.com/up/world/world/',PU='https://corsproxy.io/?'+encodeURIComponent(DU);function ok(r){if(!r.ok)throw new Error(r.status);return r.json();}function on(){mp.style.display='';document.body.classList.remove('map-hidden');}function off(){mp.style.display='none';document.body.classList.add('map-hidden');}function chk(){fetch(DU).then(ok).then(on).catch(function(){fetch(PU).then(ok).then(on).catch(off);});}chk();setInterval(chk,30000);})();
  </script>

  <!-- Floating chat widget -->
  <style>
    .chat-widget-btn {
      position: fixed;
      z-index: 500;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(85,255,85,0.5);

      width: 180px; padding: 6px 10px; background: rgba(0,0,0,0.6);
      border: 1px solid rgba(85,255,85,0.3); border-radius: 3px;
      color: #d8d8d8; font-family: 'Minecraft', sans-serif; font-size: 0.7rem;
      outline: none; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto;
    }
    .cw-name-box button {
      padding: 6px 18px; background: rgba(85,255,85,0.22);
      border: 2px solid rgba(85,255,85,0.5); border-radius: 3px;
      color: #55ff55; font-family: 'Minecraft', sans-serif; font-size: 0.65rem; cursor: pointer;
    }
    .cw-expand-link {
      display: block; text-align: center; padding: 4px;
      font-size: 0.55rem; color: #888;
      text-decoration: none; border-top: 1px solid rgba(85,255,85,0.12);
    }
    .cw-expand-link:hover { color: #55ff55; }
    .cw-logout { background: none; border: none; color: #888; font-family: 'Minecraft', sans-serif; font-size: 0.55rem; cursor: pointer; margin-left: 6px; padding: 0; }
    .cw-logout:hover { color: #ff5555; }
    .cw-resize-handle { display: none; position: absolute; top: 0; left: 0; width: 16px; height: 16px; cursor: nwse-resize; z-index: 12; }
    .cw-resize-handle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 8px; height: 8px; border-top: 2px solid rgba(85,255,85,0.5); border-left: 2px solid rgba(85,255,85,0.5); }
    @media (min-width: 721px) {
      .chat-widget-btn { bottom: 320px; right: 24px; }
      .chat-widget-panel { bottom: 380px; right: 24px; }
      .cw-resize-handle { display: block; }
    }
    @media (min-width: 721px) {
      body.map-hidden .chat-widget-btn { bottom: 20px; }
      body.map-hidden .chat-widget-panel { bottom: 80px; }
    }
    @media (max-width: 720px) {
      .chat-widget-btn { bottom: 16px; right: 16px; }
      .chat-widget-panel { bottom: 76px; right: 8px; width: 290px; height: 370px; }
    }
  </style>
  <button class="chat-widget-btn" id="cwToggle" title="Open chat"><img src="../images/chat_icon.png" alt="Chat" /></button>
  <div class="chat-widget-panel" id="cwPanel">
    <div class="cw-resize-handle" id="cwResize"></div>
    <div class="cw-header">
      <span>Chat <span class="cw-status" id="cwStatus">Connecting...</span></span>
      <span><button class="cw-logout" id="cwLogout" title="Switch username" style="display:none">[switch]</button><button class="cw-close" id="cwClose">&times;</button></span>
    </div>
    <div class="cw-messages" id="cwMessages"></div>
    <div class="cw-input-area">
      <input type="text" id="cwInput" placeholder="Type a message..." maxlength="500" autocomplete="off" disabled />
      <button id="cwSend" disabled>Send</button>
    </div>
    <a class="cw-expand-link" href="/chat/">Open full chat &rarr;</a>
    <div class="cw-name-overlay" id="cwNameOverlay">
      <div class="cw-name-box">
        <h3>Guest Name</h3>
        <input type="text" id="cwNameInput" placeholder="Your name" maxlength="24" autocomplete="off" />
        <button id="cwNameBtn">Join</button>
      </div>
    </div>
  </div>
  <script>
  (function() {
    var WS_URL = 'wss://chat.return2beta.com';
    var toggle = document.getElementById('cwToggle');
    var panel = document.getElementById('cwPanel');
    var closeBtn = document.getElementById('cwClose');
    var msgs = document.getElementById('cwMessages');
    var input = document.getElementById('cwInput');
    var sendBtn = document.getElementById('cwSend');
    var status = document.getElementById('cwStatus');
    var nameOverlay = document.getElementById('cwNameOverlay');
    var nameInput = document.getElementById('cwNameInput');
    var nameBtn = document.getElementById('cwNameBtn');
    var logoutBtn = document.getElementById('cwLogout');
    var ws = null, username = localStorage.getItem('r2b_chat_username'), reconnectDelay = 1000, opened = false;

    if (username) { nameOverlay.classList.add('hidden'); logoutBtn.style.display = ''; }

    toggle.addEventListener('click', function() {
      panel.classList.toggle('open');
      if (!opened) { opened = true; connect(); }
    });
    closeBtn.addEventListener('click', function() { panel.classList.remove('open'); });

    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
    function addMsg(html) { var d = document.createElement('div'); d.className='cw-msg'; d.innerHTML=html; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
    function addSys(t) { var d=document.createElement('div'); d.className='cw-msg system'; d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
    function renderChat(m) {
      var nc = m.source==='discord'?'name-discord':'name-web';
      var b = m.source==='discord'?'[Discord]':'[Guest]';
      addMsg('<span class="time">'+escapeHtml(formatTime(m.timestamp))+'</span><span class="'+nc+'">'+escapeHtml(b+' '+m.username)+':</span> '+escapeHtml(m.text));
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        status.textContent='Connected'; status.classList.add('connected');
        reconnectDelay=1000;
        if (username) ws.send(JSON.stringify({type:'set_username',username:username}));
      };
      ws.onmessage = function(e) {
        var data; try{data=JSON.parse(e.data);}catch(x){return;}
        if (data.type==='history' && data.messages) { data.messages.forEach(renderChat); return; }
        if (data.type==='username_set') { nameOverlay.classList.add('hidden'); logoutBtn.style.display = ''; input.disabled=false; sendBtn.disabled=false; input.focus(); return; }
        if (data.type==='error') { addSys(data.message); return; }
        if (data.type==='chat') renderChat(data);
      };
      ws.onclose = function() {
        status.textContent='Reconnecting...'; status.classList.remove('connected');
        input.disabled=true; sendBtn.disabled=true;
        setTimeout(connect, reconnectDelay);
        reconnectDelay=Math.min(reconnectDelay*2,15000);
      };
      ws.onerror = function() { ws.close(); };
    }

    function send() {
      var t=input.value.trim(); if(!t||!ws||ws.readyState!==1)return;
      ws.send(JSON.stringify({type:'chat',text:t})); input.value=''; input.focus();
    }
    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', function(e){if(e.key==='Enter')send();});
    nameBtn.addEventListener('click', function(){
      var n=nameInput.value.trim(); if(!n)return; username=n;
      localStorage.setItem('r2b_chat_username', n);
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'set_username',username:n}));
    });
    nameInput.addEventListener('keydown', function(e){if(e.key==='Enter')nameBtn.click();});
    logoutBtn.addEventListener('click', function(){
      username = null; localStorage.removeItem('r2b_chat_username');
      nameOverlay.classList.remove('hidden'); logoutBtn.style.display = 'none';
      input.disabled = true; sendBtn.disabled = true;
      nameInput.value = ''; nameInput.focus();
    });
  })();
  </script>
  <script>
  (function(){var h=document.getElementById('cwResize'),p=document.getElementById('cwPanel');if(!h||!p)return;h.addEventListener('mousedown',function(e){e.preventDefault();var sw=p.offsetWidth,sh=p.offsetHeight,sx=e.clientX,sy=e.clientY;function move(e){p.style.width=Math.max(300,sw+(sx-e.clientX))+'px';p.style.height=Math.max(300,sh+(sy-e.clientY))+'px';}function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);});})();
  </script>
  <script>
  (function(){var dd=document.getElementById('gamesDropdown');if(!dd)return;dd.addEventListener('click',function(e){if(window.innerWidth<=720){e.stopPropagation();dd.classList.toggle('open');}});document.addEventListener('click',function(){dd.classList.remove('open');});})();
  </script>
</body>
</html>
