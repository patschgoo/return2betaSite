general:
    debug-mode: false
    defaults:
        talk-when-close: false
        enable-following: true
    selection:
        quick-select: false
    healers:
        pay-for-heal: true
        regen-health: true
    chat:
        selection-message: <g>You selected <y><npc><g> (ID <y><npcid><g>).
        default-text: Hello.;How are you today?;Having a nice day?;Good weather today.;Stop hitting me!;I'm bored.;
        format: '[%name%]: '
        slashes-to-spaces: true
        creation-message: <g>The NPC <y><npc><g> was born!
    notify-updates: false
    use-bukkit-permissions: false
    colors:
        npc-colour: f
        use-npc-colours: true
    wizards:
        wizard-max-locations: 10
        regen-mana: true
        max-mana: 100
ticks:
    saving:
        delay: 72000
        save-often: true
        use-task: true
    general:
        delay: 1
    healers:
        health-regen-increment: 12000
    waypoints:
        right-click-pause: 70
    pathing:
        max-stationary: -1
        max-pathing: -1
    guards:
        respawn-delay: 100
    wizards:
        mana-regen-rate: 6000
range:
    basic:
        look: 5
    guards:
        pathfinding: 16.0
        default-bouncer-protection-radius: 10
items:
    item-list-on: true
    healers:
        give-health-item: 35
        take-health-item: 278
    basic:
        talk-items: 340,
        select-items: '*'
    wizards:
        mana-regen-item: 348
        interact-item: 288
