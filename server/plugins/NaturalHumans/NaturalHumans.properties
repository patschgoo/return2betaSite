# NaturalHumans Configuration
# ===========================

# Spawn rate (0-100): chance a human spawns with each eligible mob
spawnrate=3

# Trigger mobs (comma-separated): which mob spawns can trigger humans
trigger-mobs=ZOMBIE,SKELETON,SPIDER,CREEPER,COW,CHICKEN

# ---- Equipment Settings ----

# Chance (0-100) the human spawns with NO equipment
no-equipment-chance=50

# Set-type weights (relative, not percentages)
#   full       = complete 4-piece armor set of ONE material
#   mixed      = each armor slot picks its own random material
#   incomplete = only 1-3 armor pieces, random slots
full-set-weight=35
mixed-set-weight=35
incomplete-set-weight=30

# Material weights (higher = more likely)
material-weight-LEATHER=35
material-weight-CHAINMAIL=16
material-weight-IRON=27
material-weight-GOLD=17
material-weight-DIAMOND=5

# Hand item chance (0-100): chance the human holds a weapon/tool
hand-item-chance=33

# Hand item weights
hand-item-weight-SWORD=30
hand-item-weight-AXE=25
hand-item-weight-PICKAXE=15
hand-item-weight-SHOVEL=10
hand-item-weight-HOE=10
hand-item-weight-BOW=10

# If true, weapon material matches the dominant armor material
match-armor-material=false

# Drop chances when human dies (0.0 = never, 1.0 = always)
drop-chance-helmet=0.25
drop-chance-chestplate=0.25
drop-chance-leggings=0.25
drop-chance-boots=0.25
drop-chance-main-hand=0.25
