# QuestPlus Pools Configuration
# Each entry has: name, min, max, money-min, money-max, items
# Difficulty reflects rarity, danger level and accessibility
# Amounts are inversely proportional to difficulty
# min-tier: minimum difficulty tier for entry to appear (0=any, 1=Easy+, 2=Medium+, 3=Hard+)
#
# Economy reference points:
#   /cpublic $25, /cpassword $75, /cprivate $100
#   MemoryStone teleport $50, memorize $200, crossworld memorize $750
#   Healer/Wizard $100, Clan verify $1,000
#   Player starts with $30 (iConomy)

