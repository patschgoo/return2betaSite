shaped:
  r1:            # rX - X being the number of the recipe. Always start from 1 and increment by 1 accordingly
    result:
      id: "302"    # ID of the result item
      amount: 1  # Amount of the result item (1-64)
    grid:        # Grid can be 1x1, 1x2, 1x3, 2x2, 2x3, and 3x3
      - "ZXZ"    # If your recipe specifically needs air (nothing) somewhere, then use '*'
      - "X*X"    # And 'X' (replace X with a char that isn't '*') for any respective ingredient below
      - "***"
    ingredients:
      - "X;265"    # Left is assigned character for ingredient - Right is ID of that ingredient
      - "Z;287"

  r2:
    result:
      id: "303"
      amount: 1
    grid:
      - "Z*Z"
      - "XZX"
      - "ZXZ"
    ingredients:
      - "X;265"
      - "Z;287"

  r3:
    result:
      id: "304"
      amount: 1
    grid:
      - "ZXZ"
      - "X*X"
      - "Z*Z"
    ingredients:
      - "X;265"
      - "Z;287"

  r4:
    result:
      id: "305"
      amount: 1
    grid:
      - "Z*Z"
      - "X*X"
      - "***"
    ingredients:
      - "X;265"
      - "Z;287"

