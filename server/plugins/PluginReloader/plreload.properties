# PluginReloader configuration
# pluginTimeoutSeconds = maximum seconds allowed for one plugin reload
pluginTimeoutSeconds=30

# defaultReloadIntervalTicks = delay between plugins during sequential/range reloads
# Tick meaning: 20 = 1 second, 40 = 2 seconds, 10 = 0.5 seconds
defaultReloadIntervalTicks=20

# autoReloadModifiedPlugins = auto-reload already loaded plugins if their jar changed
autoReloadModifiedPlugins=true
