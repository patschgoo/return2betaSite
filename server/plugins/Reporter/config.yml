# Reporter Configuration File
# Plugin Version: 2.5.1
# Config Version: 2
# 02/24/2026 21:33:36

# General plugin settings
general:

  # General messaging settings
  # Minecraft color codes are supported!
  messaging:
  
    # Should mods and admins be told the number of reports when they login
    listOnLogin: true
    
    # The message that will be sent when the /report list command is used.
    # %r is the number of reports not completed.
    # %c is the number of reports completed.
    # %n creates a new line.
    reportList: '&eThere are &c%r&e reports submitted%nThere are &a%c&e completed reports'
  
    # General broadcast message settings
    broadcast:
  
      # The message that will be sent when a report is submitted.
      # %i is the index number of the report.
      reportSubmitted: '&eA report has just been submitted at index: &c%i'
    
      # The message that will be sent when a report is completed.
      # %i is the index number of the report.
      reportCompleted: '&eReport &c%i&e has just been completed'

# Database settings for storing the reports
database:

  # sqlite or mysql
  type: 'sqlite'
  
  # If you specified SQLite above this is the file name the database will use.
  # If you specified MySQL above, this will be IGNORED.
  dbName: 'reports.db'

  # If you specified MySQL above, you MUST enter the appropriate details here.
  # If you specified SQLite above, these will be IGNORED.
  host: 'localhost:3306'
  database: 'Reporter'
  username: ''
  password: ''
