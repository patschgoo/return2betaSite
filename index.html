<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Return2Beta</title>
  <link rel="icon" type="image/png" href="images/icon.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: sans-serif;
      background-image: url("images/background.png");
      background-repeat: repeat;
      background-size: auto;
      display: flex;
      flex-direction: column;
    }

    .header-band {
      height: 48px;
      width: 100%;
      background-image: url("images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 100%;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 24px 24px;
    }

    .intro {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 28px;
      text-align: center;
    }

    .intro-text {
      max-width: 520px;
      margin: 0;
      color: #ffffff;
      font-size: clamp(1.15rem, 2vw, 1.6rem);
      line-height: 1.4;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.692);
    }

    .map-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      transition: all 0.3s ease;
    }

    .map-wrapper {
      position: relative;
      width: min(24vw, 180px);
      height: min(24vw, 180px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      overflow: hidden;
      background: #111;
      transition: all 0.3s ease;
    }

    .map-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .map-controls {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }

    .map-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }

    .map-btn:hover {
      background: rgba(0, 0, 0, 0.85);
    }

    .map-label {
      margin: 0;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .map-panel.maximized {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      margin: 0;
    }

    .map-panel.maximized .map-wrapper {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
    }

    .map-panel.maximized .map-controls {
      top: 8px;
      right: 8px;
    }

    .map-panel.maximized .map-btn {
      width: 32px;
      height: 32px;
      font-size: 18px;
    }

    .map-panel.maximized .map-label {
      display: none;
    }

    .animals-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .animals {
      width: min(24vw, 180px);
      max-width: 40vw;
      height: auto;
      display: block;
    }

    .animals-label {
      margin: 0;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    @media (max-width: 720px) {
      .header-band {
        height: 120px;
      }

      .content {
        flex-direction: column;
        align-items: center;
      }

      .intro {
        padding-top: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header"></header>

  <main class="content">
    <section class="map-panel" id="mapPanel" aria-label="Server map">
      <div class="map-wrapper">
        <div class="map-controls">
          <button class="map-btn" id="mapToggle" title="Maximize map" onclick="toggleMap()">&#x26F6;</button>
        </div>
        <iframe src="https://map.return2beta.com/" title="Server Map" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
      </div>
      <p class="map-label">Server Map</p>
    </section>

    <section class="intro" aria-label="Welcome text">
      <p class="intro-text">Welcome to the return2beta corner of the internet, where odd little projects, blocky worlds, and unfinished ideas still get to breathe.</p>
    </section>

    <section class="animals-panel" aria-label="Server info">
      <img class="animals" src="images/animals.png" alt="Animals" />
      <p class="animals-label">mc.return2beta.com</p>
    </section>
  </main>

  <script>
    function toggleMap() {
      const panel = document.getElementById('mapPanel');
      const btn = document.getElementById('mapToggle');
      const maximized = panel.classList.toggle('maximized');
      btn.innerHTML = maximized ? '&#x2715;' : '&#x26F6;';
      btn.title = maximized ? 'Minimize map' : 'Maximize map';
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        const panel = document.getElementById('mapPanel');
        if (panel.classList.contains('maximized')) toggleMap();
      }
    });
  </script>
</body>
</html>
