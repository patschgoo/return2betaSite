<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Return2Beta Site</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: sans-serif;
      background-image: url("images/background.png");
      background-repeat: repeat;
      background-size: auto;
      display: flex;
      flex-direction: column;
    }

    .header-band {
      width: 100%;
      flex-shrink: 0;
    }

    .header-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      padding: 10px 16px 24px;
    }

    .animals {
      width: min(24vw, 180px);
      max-width: 40vw;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header">
    <img class="header-image" src="images/header.png" alt="Header" />
  </header>

  <main class="content">
    <img class="animals" src="images/animals.png" alt="Animals" />
  </main>
</body>
</html>
