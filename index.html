<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Return2Beta Site</title>
  <style>
    :root {
      --header-height: 180px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: sans-serif;
      background-image: url("images/background.png");
      background-repeat: repeat;
      background-size: auto;
      display: flex;
      flex-direction: column;
    }

    .header-band {
      height: var(--header-height);
      width: 100%;
      background-image: url("images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      border-bottom: 2px solid rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    .animals {
      position: fixed;
      top: 16px;
      right: 16px;
      width: min(28vw, 220px);
      max-width: 40vw;
      height: auto;
      display: block;
      z-index: 1;
    }
  </style>
</head>
<body>
  <header class="header-band" aria-label="Header"></header>

  <main class="content">
    <img class="animals" src="images/animals.png" alt="Animals" />
  </main>
</body>
</html>
