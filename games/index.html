<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games – Return2Beta</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Minecraft-Font@main/Minecraft.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Minecraft', sans-serif;
      background-image: url("../images/background.png");
      background-repeat: repeat;
      background-size: auto;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 48px;
    }
    .header-band {
      min-height: 48px;
      width: 100%;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 48px;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0 48px;
      padding: 0 48px;
      position: fixed;
      top: 0;
      z-index: 10;
    }
    .header-band::after {
      content: '';
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("../images/header.png");
      background-repeat: repeat-x;
      background-size: auto 48px;
      transform: scaleY(-1);
      z-index: 0;
      pointer-events: none;
    }
    .header-band > * {
      position: relative;
      z-index: 1;
    }
    .header-band.wrapped .howto-link {
      flex-direction: row-reverse;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .nav-link img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .nav-spacer { flex: 1; }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 40px;
      text-align: center;
      color: #fff;
    }
    .content h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: #55ff55;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.7);
      margin-bottom: 16px;
    }

    /* ── Game switcher ──────────────────────────────────── */
    .game-switcher {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .game-arrow {
      background: rgba(8,14,8,0.82);
      border: 2px solid rgba(85,255,85,0.45);
      border-radius: 4px;
      color: #55ff55;
      font-family: 'Minecraft', sans-serif;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .game-arrow:hover {
      background: rgba(20,40,20,0.9);
      color: #aaff88;
    }
    .game-title {
      font-size: clamp(0.85rem, 1.6vw, 1.1rem);
      color: #aaffaa;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
      min-width: 140px;
    }

    /* ── Game container ─────────────────────────────────── */
    .game-container {
      position: relative;
      background: rgba(0,0,0,0.68);
      border: 2px solid rgba(85,255,85,0.22);
      border-radius: 4px;
      overflow: hidden;
    }
    .game-container canvas {
      display: block;
    }
    .game-hint {
      font-size: clamp(0.55rem, 0.9vw, 0.7rem);
      color: #666;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
      margin-top: 10px;
    }
    .game-scores {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 8px;
      font-size: clamp(0.6rem, 1vw, 0.75rem);
      color: #aaa;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    }
    .game-scores span { color: #ffdd55; }
    /* Nav carousel */
    .nav-carousel { display: none; width: 100%; align-items: center; justify-content: center; height: 48px; }
    .nav-caret { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 1.1rem; cursor: pointer; padding: 0 14px; height: 48px; display: flex; align-items: center; flex-shrink: 0; transition: color 0.15s; }
    .nav-caret:hover { color: #fff; }
    .nav-caret:disabled { opacity: 0.2; cursor: default; }
    .nav-carousel-items { display: flex; align-items: center; justify-content: center; gap: 20px; flex: 1; overflow: hidden; }
    .nav-carousel .nav-link { white-space: nowrap; }
    .nav-carousel .nav-link.nav-current { color: #55ff55; text-shadow: 0 0 8px rgba(85,255,85,0.4); }
    @media (max-width: 720px) {
      .header-band {
        min-height: 48px;
        gap: 0 24px;
        padding: 0 16px;
      }
      .nav-link { font-size: 0.8rem; }
      .nav-link img { height: 28px; width: 28px; }
      .howto-text { display: none; }
      .header-band > .nav-link,
      .header-band > .nav-spacer { display: none; }
      .nav-carousel { display: flex; }
      .nav-caret { padding: 0 10px; }
      .nav-carousel-items { gap: 8px; }
    }
  </style>

  <script>
    (function () {
      var header = document.querySelector('.header-band');
      if (!header) return;
      function checkHeader() { header.classList.toggle('wrapped', header.scrollHeight > 48); }
      function updatePadding() { document.body.style.paddingTop = header.offsetHeight + 'px'; }
      var obs = new ResizeObserver(function () { checkHeader(); updatePadding(); });
      obs.observe(header);
      checkHeader();
      updatePadding();
    })();
  </script>
  <script>
    (function () {
      var header = document.querySelector('.header-band');
      if (!header) return;
      var allLinks = Array.from(header.querySelectorAll(':scope > .nav-link'));
      var spacer = header.querySelector(':scope > .nav-spacer');
      var carousel = document.getElementById('navCarousel');
      var prevBtn = document.getElementById('navPrev');
      var nextBtn = document.getElementById('navNext');
      var itemsEl = document.getElementById('navCarouselItems');
      if (!carousel || !prevBtn || !nextBtn || !itemsEl || !allLinks.length) return;
      var N = 3, page = 0;
      var total = Math.ceil(allLinks.length / N);
      var cp = location.pathname.replace(/\/$/, '') || '/';
      for (var i = 0; i < allLinks.length; i++) {
        var lh = (allLinks[i].getAttribute('href') || '').replace(/\/$/, '') || '/';
        if (lh === cp) { page = Math.floor(i / N); break; }
      }
      function render() {
        itemsEl.innerHTML = '';
        allLinks.slice(page * N, (page + 1) * N).forEach(function (a) {
          var cl = a.cloneNode(true);
          var lh = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
          if (lh === cp) cl.classList.add('nav-current');
          itemsEl.appendChild(cl);
        });
        prevBtn.disabled = page === 0;
        nextBtn.disabled = page >= total - 1;
      }
      prevBtn.addEventListener('click', function () { if (page > 0) { page--; render(); } });
      nextBtn.addEventListener('click', function () { if (page < total - 1) { page++; render(); } });
      render();
      var forced = false;
      function forceOn() {
        if (forced) return; forced = true;
        allLinks.forEach(function (a) { a.style.display = 'none'; });
        if (spacer) spacer.style.display = 'none';
        carousel.style.display = 'flex';
      }
      function forceOff() {
        if (!forced) return; forced = false;
        allLinks.forEach(function (a) { a.style.display = ''; });
        if (spacer) spacer.style.display = '';
        if (window.innerWidth > 720) carousel.style.display = 'none';
      }
      if (window.innerWidth > 720 && header.scrollHeight > 100) forceOn();
      var rt;
      window.addEventListener('resize', function () {
        clearTimeout(rt);
        rt = setTimeout(function () {
          if (window.innerWidth <= 720) { forceOff(); return; }
          forceOff();
          requestAnimationFrame(function () { if (header.scrollHeight > 100) forceOn(); });
        }, 150);
      });
    }());
  </script>

  <!-- ── Game engine ─────────────────────────────────────── -->
  <script>
  (function () {
    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var titleEl = document.getElementById('gameTitle');
    var hintEl = document.getElementById('gameHint');
    var scoreEl = document.getElementById('scoreDisplay');
    var bestEl = document.getElementById('bestDisplay');
    var siteBestEl = document.getElementById('siteBestDisplay');
    var prevBtn = document.getElementById('gamePrev');
    var nextBtn = document.getElementById('gameNext');

    var games = ['Flappy Chicken', 'Blocktris'];
    var currentGame = 0;
    var activeGame = null;
    var animId = null;

    // Load Minecraft terrain spritesheet
    var terrainImg = new Image();
    terrainImg.src = '../images/minecraft/terrain.png';
    var terrainReady = false;
    terrainImg.onload = function () { terrainReady = true; };

    // Off-screen canvas for tinting grayscale textures (grass, leaves)
    var tintCvs = document.createElement('canvas');
    tintCvs.width = 16; tintCvs.height = 16;
    var tintCtx = tintCvs.getContext('2d');

    // Draw a terrain tile with optional color tint (for grass/leaves which are grayscale)
    function drawTileTinted(ctx, tile, dx, dy, dw, dh, tint) {
      if (!terrainReady) { ctx.fillRect(dx, dy, dw, dh); return; }
      var T = 16;
      if (tint) {
        tintCtx.clearRect(0, 0, 16, 16);
        tintCtx.drawImage(terrainImg, tile[0] * T, tile[1] * T, T, T, 0, 0, 16, 16);
        tintCtx.globalCompositeOperation = 'multiply';
        tintCtx.fillStyle = tint;
        tintCtx.fillRect(0, 0, 16, 16);
        tintCtx.globalCompositeOperation = 'destination-in';
        tintCtx.drawImage(terrainImg, tile[0] * T, tile[1] * T, T, T, 0, 0, 16, 16);
        tintCtx.globalCompositeOperation = 'source-over';
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tintCvs, dx, dy, dw, dh);
      } else {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(terrainImg, tile[0] * T, tile[1] * T, T, T, dx, dy, dw, dh);
      }
    }

    function stopGame() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      if (activeGame && activeGame.cleanup) activeGame.cleanup();
      activeGame = null;
    }

    function startGame(idx) {
      stopGame();
      currentGame = idx;
      titleEl.textContent = games[idx];
      scoreEl.textContent = '0';
      if (idx === 0) {
        activeGame = flappyBird(canvas, ctx, scoreEl, bestEl, siteBestEl, hintEl, function (id) { animId = id; });
      } else {
        activeGame = tetris(canvas, ctx, scoreEl, bestEl, siteBestEl, hintEl, function (id) { animId = id; });
      }
    }

    prevBtn.addEventListener('click', function () {
      startGame((currentGame - 1 + games.length) % games.length);
    });
    nextBtn.addEventListener('click', function () {
      startGame((currentGame + 1) % games.length);
    });

    /* ================================================================
       FLAPPY CHICKEN
       ================================================================ */
    function flappyBird(cvs, c, sEl, bEl, sbEl, hEl, setAnim) {
      cvs.width = 320; cvs.height = 480;
      hEl.textContent = 'Press Space or Tap to flap';

      var W = cvs.width, H = cvs.height;
      var bird = { x: 60, y: 200, vy: 0, r: 12 };
      var pipes = [];
      var gap = 130, pipeW = 48, pipeSpeed = 2, gravity = 0.45, flapForce = -7;
      var score = 0, best = parseInt(localStorage.getItem('r2b_flappy_best') || '0', 10);
      var siteBest = parseInt(localStorage.getItem('r2b_flappy_site') || '0', 10);
      var state = 'idle';
      var frame = 0;
      var groundY = H - 48;
      var wingFrame = 0;

      var T = 16;
      var TILE_GRASS_TOP = [0, 0];
      var TILE_DIRT = [2, 0];
      var TILE_LEAVES = [4, 3];
      var TILE_LOG = [4, 1];
      var TILE_STONE = [1, 0];
      var TILE_COBBLE = [0, 1];
      var TILE_PLANKS = [4, 0];

      // Generate random stars
      var stars = [];
      for (var si = 0; si < 40; si++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * (groundY - 30),
          s: 0.5 + Math.random() * 1.5,
          b: 0.3 + Math.random() * 0.7,
          twinkle: Math.random() * Math.PI * 2
        });
      }

      // Generate clouds
      var clouds = [];
      for (var ci = 0; ci < 5; ci++) {
        clouds.push({
          x: Math.random() * (W + 100) - 50,
          y: 30 + Math.random() * 120,
          w: 40 + Math.random() * 60,
          speed: 0.15 + Math.random() * 0.2
        });
      }

      bEl.textContent = best;
      sbEl.textContent = siteBest;

      function drawTile(tile, dx, dy, dw, dh, tint) {
        drawTileTinted(c, tile, dx, dy, dw, dh, tint);
      }

      function drawChicken(cx, cy, flapAngle) {
        var s = 2;
        c.save();
        c.translate(cx, cy);
        var tilt = Math.max(-0.4, Math.min(0.5, bird.vy * 0.04));
        c.rotate(tilt);
        c.imageSmoothingEnabled = false;

        c.fillStyle = '#f0f0f0';
        c.fillRect(-6*s, -4*s, 12*s, 10*s);
        c.fillStyle = '#ddd';
        c.fillRect(-6*s, 4*s, 12*s, 2*s);

        c.fillStyle = flapAngle ? '#e8e8e8' : '#ddd';
        var wingY = flapAngle ? -6*s : -1*s;
        c.fillRect(-7*s, wingY, 4*s, 6*s);

        c.fillStyle = '#f0f0f0';
        c.fillRect(2*s, -8*s, 8*s, 8*s);

        c.fillStyle = '#111';
        c.fillRect(7*s, -7*s, 2*s, 2*s);

        c.fillStyle = '#cc2222';
        c.fillRect(4*s, -10*s, 2*s, 2*s);
        c.fillRect(6*s, -11*s, 2*s, 3*s);
        c.fillRect(8*s, -10*s, 2*s, 2*s);

        c.fillStyle = '#dd8833';
        c.fillRect(10*s, -5*s, 4*s, 2*s);

        c.fillStyle = '#cc2222';
        c.fillRect(8*s, -3*s, 2*s, 3*s);

        c.fillStyle = '#dd8833';
        c.fillRect(-2*s, 6*s, 2*s, 3*s);
        c.fillRect(2*s, 6*s, 2*s, 3*s);
        c.fillRect(-4*s, 8*s, 3*s, 1*s);
        c.fillRect(0*s, 8*s, 3*s, 1*s);

        c.fillStyle = '#e0e0e0';
        c.fillRect(-8*s, -6*s, 2*s, 4*s);
        c.fillRect(-9*s, -7*s, 2*s, 3*s);

        c.restore();
      }

      function spawnPipe() {
        var topH = 60 + Math.random() * (groundY - gap - 120);
        pipes.push({ x: W, top: topH, scored: false });
      }

      function reset() {
        bird.y = 200; bird.vy = 0;
        pipes.length = 0;
        score = 0; frame = 0; wingFrame = 0;
        sEl.textContent = '0';
        state = 'idle';
        hEl.textContent = 'Press Space or Tap to flap';
        drawFrame();
      }

      function flap() {
        if (state === 'dead') { reset(); return; }
        if (state === 'idle') { state = 'playing'; hEl.textContent = ''; }
        bird.vy = flapForce;
      }

      function update() {
        if (state !== 'playing') return;
        frame++;
        wingFrame++;
        bird.vy += gravity;
        bird.y += bird.vy;

        // move clouds
        for (var ci = 0; ci < clouds.length; ci++) {
          clouds[ci].x -= clouds[ci].speed;
          if (clouds[ci].x + clouds[ci].w < -10) {
            clouds[ci].x = W + 20;
            clouds[ci].y = 30 + Math.random() * 120;
          }
        }

        if (frame % 90 === 0) spawnPipe();

        for (var i = pipes.length - 1; i >= 0; i--) {
          var p = pipes[i];
          p.x -= pipeSpeed;
          if (p.x + pipeW < 0) { pipes.splice(i, 1); continue; }
          if (!p.scored && p.x + pipeW < bird.x) {
            p.scored = true;
            score++;
            sEl.textContent = score;
          }
          if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + pipeW) {
            if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + gap) {
              die(); return;
            }
          }
        }
        if (bird.y + bird.r > groundY || bird.y - bird.r < 0) { die(); }
      }

      function die() {
        state = 'dead';
        if (score > best) { best = score; localStorage.setItem('r2b_flappy_best', best); bEl.textContent = best; }
        if (score > siteBest) { siteBest = score; localStorage.setItem('r2b_flappy_site', siteBest); sbEl.textContent = siteBest; }
        hEl.textContent = 'Game Over! Press Space or Tap to restart';
      }

      function drawFrame() {
        // night sky gradient
        var skyGrad = c.createLinearGradient(0, 0, 0, groundY);
        skyGrad.addColorStop(0, '#070b1a');
        skyGrad.addColorStop(0.5, '#0e1a30');
        skyGrad.addColorStop(1, '#1a2a1e');
        c.fillStyle = skyGrad;
        c.fillRect(0, 0, W, H);

        // stars with twinkling
        var t = Date.now() * 0.002;
        for (var si = 0; si < stars.length; si++) {
          var st = stars[si];
          var alpha = st.b * (0.5 + 0.5 * Math.sin(t + st.twinkle));
          c.fillStyle = 'rgba(255,255,220,' + alpha + ')';
          c.fillRect(Math.floor(st.x), Math.floor(st.y), Math.ceil(st.s), Math.ceil(st.s));
        }

        // moon
        c.fillStyle = '#e8e8cc';
        c.beginPath();
        c.arc(W - 50, 55, 20, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#070b1a';
        c.beginPath();
        c.arc(W - 42, 50, 18, 0, Math.PI * 2);
        c.fill();

        // clouds (blocky Minecraft-style)
        c.fillStyle = 'rgba(200,210,220,0.12)';
        for (var ci = 0; ci < clouds.length; ci++) {
          var cl = clouds[ci];
          var bSize = 12;
          var cols = Math.ceil(cl.w / bSize);
          for (var bx = 0; bx < cols; bx++) {
            c.fillRect(cl.x + bx * bSize, cl.y, bSize - 1, bSize - 1);
            if (bx > 0 && bx < cols - 1) {
              c.fillRect(cl.x + bx * bSize, cl.y - bSize, bSize - 1, bSize - 1);
            }
          }
        }

        // ground — tiled grass (tinted green) over dirt
        c.imageSmoothingEnabled = false;
        var tileS = 24;
        for (var gx = 0; gx < W; gx += tileS) {
          drawTile(TILE_GRASS_TOP, gx, groundY, tileS, tileS, '#5a8f32');
          for (var gy = groundY + tileS; gy < H; gy += tileS) {
            drawTile(TILE_DIRT, gx, gy, tileS, tileS);
          }
        }
        // stone layer at very bottom
        for (var gx = 0; gx < W; gx += tileS) {
          drawTile(TILE_STONE, gx, H - tileS, tileS, tileS);
        }

        // pipes — log body with tinted leaves cap
        var pipeTile = 16;
        for (var i = 0; i < pipes.length; i++) {
          var p = pipes[i];

          for (var py = 0; py < p.top - 20; py += pipeTile) {
            for (var px = 0; px < pipeW; px += pipeTile) {
              var th = Math.min(pipeTile, p.top - 20 - py);
              var tw = Math.min(pipeTile, pipeW - px);
              drawTile(TILE_LOG, p.x + px, py, tw, th);
            }
          }
          for (var px = -4; px < pipeW + 4; px += pipeTile) {
            var tw = Math.min(pipeTile, pipeW + 8 - (px + 4));
            drawTile(TILE_LEAVES, p.x + px, p.top - 20, tw, 20, '#3a8f22');
          }

          var botY = p.top + gap;
          for (var px = -4; px < pipeW + 4; px += pipeTile) {
            var tw = Math.min(pipeTile, pipeW + 8 - (px + 4));
            drawTile(TILE_LEAVES, p.x + px, botY, tw, 20, '#3a8f22');
          }
          for (var py = botY + 20; py < groundY; py += pipeTile) {
            for (var px = 0; px < pipeW; px += pipeTile) {
              var th = Math.min(pipeTile, groundY - py);
              var tw = Math.min(pipeTile, pipeW - px);
              drawTile(TILE_LOG, p.x + px, py, tw, th);
            }
          }
        }

        // chicken
        var flapAnim = Math.sin(wingFrame * 0.4) > 0;
        if (state === 'idle') flapAnim = Math.sin(Date.now() * 0.005) > 0;
        drawChicken(bird.x, bird.y, flapAnim);

        // score overlay
        if (state === 'playing') {
          c.fillStyle = '#fff';
          c.font = '24px Minecraft, sans-serif';
          c.textAlign = 'center';
          c.shadowColor = 'rgba(0,0,0,0.8)';
          c.shadowBlur = 4;
          c.fillText(score, W / 2, 50);
          c.shadowBlur = 0;
        }
      }

      function loop() {
        update();
        drawFrame();
        setAnim(requestAnimationFrame(loop));
      }

      function onKey(e) {
        if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); flap(); }
      }
      function onTouch(e) {
        if (e.target === cvs) { e.preventDefault(); flap(); }
      }

      document.addEventListener('keydown', onKey);
      cvs.addEventListener('touchstart', onTouch);
      cvs.addEventListener('mousedown', function (e) { flap(); });

      reset();
      loop();

      return {
        cleanup: function () {
          document.removeEventListener('keydown', onKey);
          cvs.removeEventListener('touchstart', onTouch);
        }
      };
    }

    /* ================================================================
       BLOCKTRIS
       ================================================================ */
    function tetris(cvs, c, sEl, bEl, sbEl, hEl, setAnim) {
      var COLS = 10, ROWS = 20;
      var CELL = 22;
      var BORDER = CELL;
      var PREVIEW_W = CELL * 6;
      cvs.width = BORDER * 2 + COLS * CELL + PREVIEW_W + 4;
      cvs.height = BORDER * 2 + ROWS * CELL + 4;
      hEl.textContent = 'Press Space or Tap to start. Arrow keys / Swipe to move.';

      var OFFX = BORDER + 2;
      var OFFY = BORDER + 2;

      var T = 16;

      // Texture pool: Minecraft blocks for pieces
      var TEXTURE_POOL = [
        { tile: [2, 0], tint: null },       // dirt
        { tile: [0, 1], tint: null },       // cobblestone
        { tile: [4, 1], tint: null },       // log side (wood)
        { tile: [4, 3], tint: '#3a8f22' }, // leaves (green tint)
        { tile: [4, 0], tint: null },       // wooden planks
        { tile: [2, 1], tint: null },       // sand
        { tile: [1, 0], tint: null },       // stone
        { tile: [3, 1], tint: null },       // gravel
        { tile: [0, 11], tint: null }      // sandstone
      ];

      var FALLBACK_COLORS = ['#8B6914','#888','#6B4226','#3a8f22','#C4A55A','#DBD4A7','#777','#999','#D2C07F'];

      var SHAPES = [
        { blocks: [[0,0],[1,0],[2,0],[3,0]] },   // I
        { blocks: [[0,0],[1,0],[0,1],[1,1]] },   // O
        { blocks: [[0,0],[1,0],[2,0],[1,1]] },   // T
        { blocks: [[0,0],[1,0],[2,0],[2,1]] },   // L
        { blocks: [[0,0],[1,0],[2,0],[0,1]] },   // J
        { blocks: [[1,0],[2,0],[0,1],[1,1]] },   // S
        { blocks: [[0,0],[1,0],[1,1],[2,1]] }    // Z
      ];

      // Colored wool palette (Minecraft wool colors)
      var WOOL_COLORS = [
        '#E4E4E4','#D87F33','#B24CD8','#6699D8',
        '#E5E533','#7FCC19','#F27FA5','#4C4C4C',
        '#999999','#4C7F99','#7F3FB2','#334CB2',
        '#664C33','#667F33','#993333','#191919'
      ];

      function drawBlock(poolIdx, dx, dy, size) {
        if (poolIdx < 0 || poolIdx >= TEXTURE_POOL.length) return;
        var tex = TEXTURE_POOL[poolIdx];
        if (terrainReady) {
          drawTileTinted(c, tex.tile, dx, dy, size, size, tex.tint);
        } else {
          c.fillStyle = FALLBACK_COLORS[poolIdx] || '#888';
          c.fillRect(dx, dy, size, size);
        }
      }

      function drawWoolTile(color, dx, dy, size) {
        c.fillStyle = color;
        c.fillRect(dx, dy, size, size);
        // Subtle wool fiber texture
        c.fillStyle = 'rgba(255,255,255,0.08)';
        for (var wy = 0; wy < size; wy += 4) {
          c.fillRect(dx + (wy % 8 === 0 ? 1 : 3), dy + wy, size - 4, 1);
        }
        c.fillStyle = 'rgba(0,0,0,0.08)';
        for (var wy = 2; wy < size; wy += 4) {
          c.fillRect(dx + (wy % 8 === 0 ? 2 : 0), dy + wy, size - 3, 1);
        }
      }

      var board = [], score = 0, best = parseInt(localStorage.getItem('r2b_tetris_best') || '0', 10);
      var siteBest = parseInt(localStorage.getItem('r2b_tetris_site') || '0', 10);
      var current = null, nextPiece = null;
      var dropTimer = 0, dropInterval = 45;
      var state = 'idle';
      var lastPoolIdx = -1;

      bEl.textContent = best;
      sbEl.textContent = siteBest;

      function clearBoard() {
        board = [];
        for (var r = 0; r < ROWS; r++) {
          board[r] = [];
          for (var cl = 0; cl < COLS; cl++) board[r][cl] = -1;
        }
      }

      function randomPiece() {
        var idx = Math.floor(Math.random() * SHAPES.length);
        var s = SHAPES[idx];
        // Pick random texture different from last piece
        var poolIdx;
        do {
          poolIdx = Math.floor(Math.random() * TEXTURE_POOL.length);
        } while (poolIdx === lastPoolIdx && TEXTURE_POOL.length > 1);
        lastPoolIdx = poolIdx;
        return {
          blocks: s.blocks.map(function (b) { return [b[0], b[1]]; }),
          poolIdx: poolIdx,
          x: Math.floor(COLS / 2) - 1,
          y: 0
        };
      }

      function fits(piece, dx, dy, blocks) {
        var bl = blocks || piece.blocks;
        for (var i = 0; i < bl.length; i++) {
          var nx = piece.x + bl[i][0] + dx;
          var ny = piece.y + bl[i][1] + dy;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
          if (ny >= 0 && board[ny][nx] >= 0) return false;
        }
        return true;
      }

      function lock() {
        for (var i = 0; i < current.blocks.length; i++) {
          var bx = current.x + current.blocks[i][0];
          var by = current.y + current.blocks[i][1];
          if (by < 0) { die(); return; }
          board[by][bx] = current.poolIdx;
        }
        var cleared = 0;
        for (var r = ROWS - 1; r >= 0; r--) {
          var full = true;
          for (var cl = 0; cl < COLS; cl++) { if (board[r][cl] < 0) { full = false; break; } }
          if (full) {
            board.splice(r, 1);
            var row = [];
            for (var cl = 0; cl < COLS; cl++) row.push(-1);
            board.unshift(row);
            cleared++;
            r++;
          }
        }
        if (cleared > 0) {
          var pts = [0, 100, 300, 500, 800];
          score += pts[cleared] || cleared * 200;
          sEl.textContent = score;
        }
        spawn();
      }

      function spawn() {
        current = nextPiece || randomPiece();
        nextPiece = randomPiece();
        if (!fits(current, 0, 0)) die();
      }

      function rotate() {
        if (!current) return;
        var rotated = current.blocks.map(function (b) { return [-b[1], b[0]]; });
        var minX = Infinity, minY = Infinity;
        for (var i = 0; i < rotated.length; i++) {
          if (rotated[i][0] < minX) minX = rotated[i][0];
          if (rotated[i][1] < minY) minY = rotated[i][1];
        }
        rotated = rotated.map(function (b) { return [b[0] - minX, b[1] - minY]; });
        if (fits(current, 0, 0, rotated)) current.blocks = rotated;
      }

      function die() {
        state = 'dead';
        if (score > best) { best = score; localStorage.setItem('r2b_tetris_best', best); bEl.textContent = best; }
        if (score > siteBest) { siteBest = score; localStorage.setItem('r2b_tetris_site', siteBest); sbEl.textContent = siteBest; }
        hEl.textContent = 'Game Over! Press Space or Tap to restart';
      }

      function reset() {
        clearBoard();
        score = 0; dropTimer = 0;
        sEl.textContent = '0';
        state = 'idle';
        current = null; nextPiece = null;
        lastPoolIdx = -1;
        hEl.textContent = 'Press Space or Tap to start. Arrow keys to move.';
        drawFrame();
      }

      function begin() {
        state = 'playing';
        hEl.textContent = '';
        spawn();
      }

      function update() {
        if (state !== 'playing') return;
        dropTimer++;
        if (dropTimer >= dropInterval) {
          dropTimer = 0;
          if (fits(current, 0, 1)) {
            current.y++;
          } else {
            lock();
          }
        }
      }

      function drawFrame() {
        // Dark stone cave background
        c.fillStyle = '#0e0e12';
        c.fillRect(0, 0, cvs.width, cvs.height);

        // Draw colored wool border around the playfield
        var bS = BORDER;
        var wIdx = 0;
        // top border
        for (var bx = 0; bx < COLS + 2; bx++) {
          drawWoolTile(WOOL_COLORS[wIdx % WOOL_COLORS.length], OFFX - bS + bx * bS, OFFY - bS, bS, bS);
          wIdx++;
        }
        // right border
        for (var by = 0; by < ROWS; by++) {
          drawWoolTile(WOOL_COLORS[wIdx % WOOL_COLORS.length], OFFX + COLS * CELL, OFFY + by * CELL, bS, CELL);
          wIdx++;
        }
        // bottom border (reversed)
        for (var bx = COLS + 1; bx >= 0; bx--) {
          drawWoolTile(WOOL_COLORS[wIdx % WOOL_COLORS.length], OFFX - bS + bx * bS, OFFY + ROWS * CELL, bS, bS);
          wIdx++;
        }
        // left border (reversed)
        for (var by = ROWS - 1; by >= 0; by--) {
          drawWoolTile(WOOL_COLORS[wIdx % WOOL_COLORS.length], OFFX - bS, OFFY + by * CELL, bS, CELL);
          wIdx++;
        }

        // Playfield background - subtle dark cave pattern
        for (var r = 0; r < ROWS; r++) {
          for (var cl = 0; cl < COLS; cl++) {
            if ((r + cl) % 2 === 0) {
              c.fillStyle = 'rgba(255,255,255,0.02)';
            } else {
              c.fillStyle = 'rgba(0,0,0,0.05)';
            }
            c.fillRect(OFFX + cl * CELL, OFFY + r * CELL, CELL, CELL);
          }
        }

        // Locked blocks
        for (var r = 0; r < ROWS; r++) {
          for (var cl = 0; cl < COLS; cl++) {
            if (board[r][cl] >= 0) {
              drawBlock(board[r][cl], OFFX + cl * CELL + 1, OFFY + r * CELL + 1, CELL - 2);
            }
          }
        }

        // Current piece
        if (current) {
          for (var i = 0; i < current.blocks.length; i++) {
            var bx = current.x + current.blocks[i][0];
            var by = current.y + current.blocks[i][1];
            if (by >= 0) {
              drawBlock(current.poolIdx, OFFX + bx * CELL + 1, OFFY + by * CELL + 1, CELL - 2);
            }
          }
        }

        // Preview area (no border)
        var previewX = OFFX + COLS * CELL + BORDER + 8;
        var previewCenterX = previewX + (PREVIEW_W - BORDER - 8) / 2;

        c.fillStyle = '#ddd';
        c.font = (CELL * 0.7) + 'px Minecraft, sans-serif';
        c.textAlign = 'center';
        c.shadowColor = 'rgba(0,0,0,0.9)';
        c.shadowBlur = 0;
        c.shadowOffsetX = 2;
        c.shadowOffsetY = 2;
        c.fillText('NEXT', previewCenterX, OFFY + CELL * 1.2);
        c.shadowOffsetX = 0;
        c.shadowOffsetY = 0;

        if (nextPiece) {
          var maxBx = 0;
          for (var i = 0; i < nextPiece.blocks.length; i++) {
            if (nextPiece.blocks[i][0] > maxBx) maxBx = nextPiece.blocks[i][0];
          }
          var pieceW = (maxBx + 1) * CELL;
          var startX = previewCenterX - pieceW / 2;

          for (var i = 0; i < nextPiece.blocks.length; i++) {
            var px = startX + nextPiece.blocks[i][0] * CELL;
            var py = OFFY + CELL * 2 + nextPiece.blocks[i][1] * CELL;
            drawBlock(nextPiece.poolIdx, px + 1, py + 1, CELL - 2);
          }
        }

        // Score display
        c.shadowColor = 'rgba(0,0,0,0.9)';
        c.shadowOffsetX = 2;
        c.shadowOffsetY = 2;
        c.fillStyle = '#ddd';
        c.font = (CELL * 0.65) + 'px Minecraft, sans-serif';
        c.textAlign = 'center';
        c.fillText('SCORE', previewCenterX, OFFY + CELL * 8);
        c.fillStyle = '#ffdd55';
        c.font = (CELL * 0.8) + 'px Minecraft, sans-serif';
        c.fillText(score, previewCenterX, OFFY + CELL * 9.2);
        c.shadowOffsetX = 0;
        c.shadowOffsetY = 0;
      }

      function loop() {
        update();
        drawFrame();
        setAnim(requestAnimationFrame(loop));
      }

      function onKey(e) {
        if (state === 'dead' && (e.code === 'Space' || e.key === ' ')) { e.preventDefault(); reset(); return; }
        if (state === 'idle' && (e.code === 'Space' || e.key === ' ')) { e.preventDefault(); begin(); return; }
        if (state !== 'playing') return;
        if (e.code === 'ArrowLeft' || e.key === 'ArrowLeft') { if (fits(current, -1, 0)) current.x--; e.preventDefault(); }
        else if (e.code === 'ArrowRight' || e.key === 'ArrowRight') { if (fits(current, 1, 0)) current.x++; e.preventDefault(); }
        else if (e.code === 'ArrowDown' || e.key === 'ArrowDown') { if (fits(current, 0, 1)) { current.y++; dropTimer = 0; } e.preventDefault(); }
        else if (e.code === 'ArrowUp' || e.key === 'ArrowUp') { rotate(); e.preventDefault(); }
        else if (e.code === 'Space' || e.key === ' ') {
          // hard drop
          while (fits(current, 0, 1)) current.y++;
          lock();
          e.preventDefault();
        }
      }

      function onTouch(e) {
        if (e.target !== cvs) return;
        e.preventDefault();
        if (state === 'dead') { reset(); return; }
        if (state === 'idle') { begin(); return; }
        // simple: tap left half = move left, right half = move right, top area = rotate
        var rect = cvs.getBoundingClientRect();
        var tx = (e.touches[0].clientX - rect.left) / rect.width;
        var ty = (e.touches[0].clientY - rect.top) / rect.height;
        if (ty < 0.3) { rotate(); }
        else if (tx < 0.35) { if (fits(current, -1, 0)) current.x--; }
        else if (tx > 0.65) { if (fits(current, 1, 0)) current.x++; }
        else { if (fits(current, 0, 1)) { current.y++; dropTimer = 0; } }
      }

      document.addEventListener('keydown', onKey);
      cvs.addEventListener('touchstart', onTouch);

      reset();
      loop();

      return {
        cleanup: function () {
          document.removeEventListener('keydown', onKey);
          cvs.removeEventListener('touchstart', onTouch);
        }
      };
    }

    // Start with Flappy Bird
    startGame(0);
  })();
  </script>
